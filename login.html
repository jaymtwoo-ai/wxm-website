<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN — WXM</title>
  <meta name="description" content="WXM 파트너 로그인" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/common.css" />
  <style>
    /* login.html — [C] 단순형 (한 화면) */
    .login-section { padding: 52px 48px 64px; }
    .login-inner { max-width: 480px; margin: 0 auto; }

    .login-card {
      background: #F8F5EE;
      border: 0.5px solid var(--bc);
      border-radius: 16px;
      padding: 40px 36px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--g);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      border: 0.5px solid rgba(31,64,55,0.22);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Pretendard', 'Figtree', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: rgba(255,255,255,0.6);
      outline: none;
    }
    .field input:focus {
      border-color: rgba(31,64,55,0.45);
      box-shadow: 0 0 0 3px rgba(31,64,55,0.06);
    }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 8px;
      min-height: 48px;
      border: none;
      border-radius: 40px;
      padding: 14px 24px;
      font-family: 'Figtree', 'Pretendard', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream);
      background: var(--g);
      cursor: pointer;
    }
    .login-btn:hover { background: #18352e; }

    .login-note {
      margin-top: 20px;
      font-family: 'Pretendard', 'Figtree', system-ui, sans-serif;
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
      text-align: center;
      word-break: keep-all;
    }

    .site-footer { border-top-color: var(--line-on-dark); }
    .footer-top {
      max-width: 1400px;
      margin: 0 auto;
      padding: 26px 48px 22px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 40px;
      border-bottom: 0.5px solid var(--line-on-dark);
    }
    .ft-logo { font-size: 14px; font-weight: 700; letter-spacing: 0.22em; color: #F4F0E8; margin-bottom: 6px; }
    .ft-sub { font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; color: rgba(244,240,232,0.35); margin-bottom: 3px; text-transform: uppercase; }
    .ft-tagline { font-size: 11px; color: rgba(244,240,232,0.28); }
    .ft-company-name { font-size: 12px; font-weight: 700; color: rgba(244,240,232,0.75); margin-bottom: 6px; }
    .ft-company-info { font-size: 11px; color: rgba(244,240,232,0.42); line-height: 1.9; }
    .ft-langs { display: flex; gap: 20px; justify-content: flex-end; padding-top: 4px; }
    .ft-lang { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: rgba(244,240,232,0.35); }
    .ft-lang.active { color: rgba(244,240,232,0.85); }
    .footer-bottom { max-width: 1400px; margin: 0 auto; padding: 10px 48px 12px; }
    .ft-copy { font-size: 10px; color: rgba(244,240,232,0.28); }

    @media (max-width: 768px) {
      .header-inner { padding: 0 22px; }
      .header-nav { gap: 22px; }
      .nav-pill { display: none; }
    }
  </style>
  <link rel="stylesheet" href="css/mobile.css?v=9">
</head>
<body class="page-type-c">

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">W X M</a>
      <nav class="header-nav">
        <a href="index.html#about" class="nav-link">ABOUT</a>
        <a href="index.html#roadmap" class="nav-link">BRANDS</a>
        <a href="coming-soon.html" class="nav-link">SEMINAR &amp; EVENT</a>
        <div class="header-right">
          <a href="contact.html" class="nav-pill">CONTACT US</a>
          <a href="login.html" class="nav-pill active">LOGIN</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="page-header-inner">
        <div class="ph-label">LOGIN</div>
        <div class="ph-title">WXM 파트너 로그인</div>
      </div>
    </div>

    <section class="login-section">
      <div class="login-inner">
        <form class="login-card" action="#" method="post" onsubmit="return false;">
          <div class="field">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="이메일을 입력해 주세요" autocomplete="email" />
          </div>
          <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력해 주세요" autocomplete="current-password" />
          </div>
          <button type="submit" class="login-btn">
            <i class="ti ti-login"></i>
            LOGIN
          </button>
          <p class="login-note">계정 문의는 <a href="contact.html" style="color:var(--g);font-weight:600;">CONTACT US</a>로 연결해 주세요.</p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-top">
      <div>
        <div class="ft-logo">W X M</div>
        <div class="ft-sub">WELLNESS × MECHANISM</div>
        <div class="ft-tagline">We Design Wellness x Mechanism</div>
      </div>
      <div>
        <div class="ft-company-name">더블유엑스엠 주식회사</div>
        <div class="ft-company-info">
          사업자등록번호 155-81-03984 &nbsp;|&nbsp; 대표 이지민<br>
          Contact &nbsp;010-2580-4127 &nbsp;|&nbsp; jimin@wxm.co.kr
        </div>
      </div>
      <div class="ft-langs">
        <span class="ft-lang active">KR</span>
        <a href="coming-soon.html" class="ft-lang">EN</a>
        <a href="coming-soon.html" class="ft-lang">JP</a>
        <a href="coming-soon.html" class="ft-lang">CN</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="ft-copy">© WXM Inc. All rights reserved.</span>
    </div>
  </footer>

</body>
</html>
